version: "3.9"

services:

  # =====================
  # MYSQL DATABASE
  # =====================
  mysql:
    image: mysql:8
    container_name: mysql_db
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # =====================
  # LARAVEL API
  # =====================
  api:
    build:
      context: ./api
    container_name: laravel_api
    restart: always
    working_dir: /var/www
    volumes:
      - ./api:/var/www
    ports:
      - "${LARAVEL_PORT}:8000"
    env_file:
      - .env
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_ROOT_USERNAME:-root}
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      - mysql
    command: php artisan serve --host=0.0.0.0 --port=8000

  # =====================
  # NEXT.JS WEB (PWA)
  # =====================
  web:
    build:
      context: ./web
    container_name: next_web
    restart: always
    working_dir: /app
    volumes:
      - ./web:/app
      - /app/node_modules
    ports:
      - "${NEXT_PORT}:3000"
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    command: npm run dev

volumes:
  mysql_data: